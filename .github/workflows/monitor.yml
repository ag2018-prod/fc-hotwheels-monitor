name: FirstCry Hot Wheels Monitor

on:
  schedule:
    # Runs every 5 minutes — GitHub's minimum is 5 min
    - cron: "*/5 * * * *"

  # Allows you to manually trigger a run from GitHub's UI
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repo code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install requests

      # Step 4: Restore previous stock state (so we don't re-alert)
      - name: Restore stock state cache
        uses: actions/cache@v4
        with:
          path: last_state.json
          key: stock-state-${{ github.run_id }}
          restore-keys: |
            stock-state-

      # Step 5: Run the monitor
      - name: Run stock monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      # Step 6: Save updated stock state for next run
      - name: Save stock state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_state.json
          key: stock-state-${{ github.run_id }}
