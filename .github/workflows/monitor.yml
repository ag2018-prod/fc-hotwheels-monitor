name: FirstCry Hot Wheels Monitor

on:
  schedule:
    # Every 10 minutes — more reliable than */5 on GitHub free tier
    # GitHub cron runs on UTC time
    - cron: "0/10 * * * *"

  # Manual trigger from GitHub UI
  workflow_dispatch:

# Required permission to push state file back to repo
permissions:
  contents: write

jobs:
  check-stock:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo (with write token so we can save state)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install requests

      # Step 4: Run the monitor
      - name: Run stock monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      # Step 5: Save state file back to repo (so next run remembers last state)
      - name: Commit stock state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_state.json || true
          git diff --staged --quiet || git commit -m "chore: update stock state [skip ci]"
          git push || true
